name: Taller03

env: # ← nivel workflow (disponible en todos los jobs)
  APP_NAME: lab-github-actions
  REGISTRY: docker.io
  IMAGE_TAG: ${{ github.sha }}

on:
  workflow_dispatch:

jobs:
  mostrar-informacion:
    name: Imprimir contexto
    runs-on: ubuntu-latest
    env:                      # ← nivel job (disponible en todos los steps del job)
      BUILD_TARGET: production

    steps:
      - name: Mostrar info
        env: # ← nivel step (solo en este step)
          STEP_VAR: valor-local
        run: |
          echo " ------------------- "
          echo "APP: $APP_NAME"
          echo "Target: $BUILD_TARGET"
          echo "Step var: $STEP_VAR"
          echo " ------------------- "
          echo "SHA: $IMAGE_TAG"
          echo "Branch: ${{ github.ref_name }}"
          echo "Evento: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Runner OS: ${{ runner.os }}"
          echo " ------------------- "
  lanza-tag:
    name: Genera un tag y lo captura en el otro step
    runs-on: ubuntu-latest
    needs: mostrar-informacion
    outputs:
      image-tag: ${{ steps.tag.outputs.value }}   # ← expone el output del job
    steps:
        - name: Generar tag de imagen
          id: tag # ← necesario para referenciarlo después
          run: |
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "value=$SHORT_SHA" >> "$GITHUB_OUTPUT"
        - name: Captura un tag 
          run: echo "${{ steps.tag.outputs.value }}"
  captura-tag:
    name: Captura un tag de otro job
    runs-on: ubuntu-latest
    needs: lanza-tag
    steps:
      - name: Captura el tag de lanza-tag
        run: echo"${{ needs.lanza-tag.outputs.image-tag }}"
