name: Pipeline DevOps

on:
  workflow_dispatch:

jobs:
  prueba:
    name: Imprimir contexto
    runs-on: ubuntu-latest

    steps:
      - name: Mostrar info
        run: |
          echo "SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Evento: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Runner OS: ${{ runner.os }}"
